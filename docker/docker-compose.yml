services:

  nginx:
    build:
      context: ../nginx
    container_name: telemedicine_nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  frontend:
    build:
      context: ../frontend
    container_name: telemedicine_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    build:
      context: ../backend
    container_name: telemedicine_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/telemedicine
    restart: always
    networks:
      - app_network

  db:
    image: postgres:15
    container_name: telemedicine_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telemedicine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
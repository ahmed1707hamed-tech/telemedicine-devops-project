version: '3.8'

services:

  nginx:
    build: ../nginx
    container_name: telemedicine_nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app_network
    restart: always

  frontend:
    build: ../frontend
    container_name: telemedicine_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network
    restart: always

  backend:
    build: ../backend
    container_name: telemedicine_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/telemedicine
    networks:
      - app_network
    restart: always

  db:
    image: postgres:15
    container_name: telemedicine_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telemedicine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: telemedicine_prometheus
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - app_network
    restart: always

  grafana:
    image: grafana/grafana
    container_name: telemedicine_grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    networks:
      - app_network
    restart: always

  node-exporter:
    image: prom/node-exporter
    container_name: telemedicine_node_exporter
    ports:
      - "9100:9100"
    networks:
      - app_network
    restart: always

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge